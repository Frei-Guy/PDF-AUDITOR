<script>
function analyzeDeal(showEmpty=true){
  const customerName = val('customerName');
  const dealDate = val('dealDate');
  const vin = val('vin');
  const amountFinanced = num('amountFinanced');
  const bookValue = num('bookValue');
  const term = num('term');
  const apr = num('apr');
  const payment = num('payment');
  const file = document.getElementById('pdfFile').files[0];

  let issues = [];
  let warnings = [];
  let score = 10;

  // ✅ ONLY validate if field exists

  if(customerName && customerName.length < 2){
    issues.push('Customer name looks incorrect.');
    score -= 1;
  }

  if(dealDate){
    const today = new Date().toISOString().split('T')[0];
    if(dealDate !== today){
      warnings.push('Date does not match today.');
      score -= .5;
    }
  }

  if(vin){
    if(vin.length !== 17){
      issues.push('VIN must be 17 characters.');
      score -= 1.5;
    }
  }

  // LTV only if BOTH values exist
  if(amountFinanced && bookValue){
    const ltv = amountFinanced / bookValue * 100;

    if(ltv > 120){
      issues.push('LTV extremely high: ' + pct(ltv));
      score -= 2.5;
    } else if(ltv > 110){
      warnings.push('LTV high: ' + pct(ltv));
      score -= 1;
    } else if(ltv > 100){
      warnings.push('LTV over 100%: ' + pct(ltv));
      score -= .5;
    }
  }

  if(term && term > 84){
    warnings.push('Term over 84 months.');
    score -= .5;
  }

  if(apr && apr > 24){
    warnings.push('APR unusually high.');
    score -= .5;
  }

  // Payment check ONLY if all exist
  if(amountFinanced && term && apr && payment){
    const monthlyRate = apr / 100 / 12;
    const calcPayment = monthlyRate === 0
      ? amountFinanced / term
      : amountFinanced * monthlyRate / (1 - Math.pow(1 + monthlyRate, -term));

    const diff = Math.abs(calcPayment - payment);

    if(diff > 5){
      warnings.push('Payment mismatch estimate.');
      score -= .5;
    }
  }

  // 🚫 REMOVE PDF requirement (optional now)
  if(file){
    warnings.push('PDF uploaded (OCR engine coming next).');
  }

  score = Math.max(0, Math.min(10, score));
  document.getElementById('scoreNum').textContent = score.toFixed(1);

  let status = '';

  if(issues.length === 0 && warnings.length === 0){
    status = '<span class="good">✔ Clean (based on provided fields)</span>';
  } else if(issues.length > 0){
    status = '<span class="bad">❌ Issues found</span>';
  } else {
    status = '<span class="warn">⚠ Review suggested</span>';
  }

  document.getElementById('summaryBox').innerHTML = `
    ${status}
    <div class="small" style="margin-top:8px">
      Mode: <strong>${currentMode === 'sales' ? 'Sales Mode' : 'Audit Mode'}</strong><br>
      Fields Used: <strong>${getUsedFields()}</strong>
    </div>
  `;

  let resultHtml = '';

  if(issues.length){
    resultHtml += `<div class="lineitem"><strong class="bad">Critical</strong></div>`;
    issues.forEach(i => resultHtml += `<div class="lineitem">❌ ${i}</div>`);
  }

  if(warnings.length){
    resultHtml += `<div class="lineitem"><strong class="warn">Warnings</strong></div>`;
    warnings.forEach(w => resultHtml += `<div class="lineitem">⚠️ ${w}</div>`);
  }

  if(!issues.length && !warnings.length){
    resultHtml = `<div class="lineitem good">✔ Nothing flagged.</div>`;
  }

  document.getElementById('resultsBox').innerHTML = resultHtml;

  if(currentMode === 'audit'){
    buildAuditBox(score, issues, warnings);
  }
}
